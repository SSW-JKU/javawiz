name: Backend Tests

on:
  # Test every pushed commit and tag, every published release, and allow manual runs.
  push:
  release:
    types: [published]
  workflow_dispatch:

# When new commits arrive quickly, only the newest run matters. Release runs are always completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

# Reading the repository is enough for the build. Writing checks lets the workflow show
# test results and failures directly on GitHub.
permissions:
  contents: read
  checks: write

jobs:
  backend-tests:
    name: Backend tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # The build does not need Git credentials after checkout.
          persist-credentials: false

      # JavaWiz supports JDK 25 and 26, so both must be available to the Gradle test tasks.
      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # testAll runs the standard test suite once for every supported JDK.
      - name: Run all backend tests
        shell: bash
        run: bash ./gradlew :backend:testAll --no-daemon --stacktrace

      # Store both formats: XML for tools and the full Gradle HTML report for people.
      - name: Upload complete test reports
        id: test-report-artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-reports-${{ matrix.os }}
          path: |
            backend/build/test-results/
            backend/build/reports/tests/
          if-no-files-found: warn
          retention-days: 90
          compression-level: 9

      # Turn the JUnit XML into a readable GitHub summary with annotations for failed tests.
      - name: Publish test results
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: backend/build/test-results/**/TEST-*.xml
          check_name: Backend tests (${{ matrix.os }})
          detailed_summary: true
          fail_on_parse_error: true
          require_tests: true
          job_summary_text: >-
            [Download the complete Gradle HTML and JUnit XML reports](${{ steps.test-report-artifact.outputs.artifact-url }}).
