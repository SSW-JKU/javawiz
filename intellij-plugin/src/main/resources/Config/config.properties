# Notification Configuration
notificationGroupId=JavaWizNotifications
notificationGroupKey=JavaWizNotifications
notificationTitle=JavaWiz Notifications

# GUI Configurations
guiFrontendId=JavaWiz
guiTerminalId=JavaWiz I/O
guiExecuterId=JavaWizExecuter
guiContextId=DebugWithJavaWizContext
guiButtonTitleRun=Debug with JavaWiz
guiButtonTitleStop=Stop JavaWiz

# Plugin Information
pluginId=at.jku.ssw.JavaWiz
pluginName=JavaWiz
pluginExtractionPath=javawiz-intellij

# Directory Structure
dirFrontend=Frontend
dirBackend=Backend
dirDefault=Default
dirLog=Log

# Backend (Debugger - Jar)
# Note: this value is overridden at build time by intellij-plugin/build.gradle.kts
# to match the actual backend project version (e.g. libs/backend-1.8.0.jar).
backendJarName=libs/backend.jar
debugableExtensions=java

# Frontend (Http Server)
frontendEndpointStatus=/Status
frontendEndpointRoot=/
frontendTabName=Debugger

# Default Resources
defaultIndexURL=default.html


# LOG
logEnabled=true
logDelimiter=;
logFileNamePlugin=javawiz-plugin.log
logFileNameAction=javawiz-action.log
logFileNameFrontend=javawiz-frontend.log
logFileNameBackend=javawiz-backend.log
logFileNameCommunication=javawiz-communication.log
logFileNameGeneral=javawiz.log

# Port Configurations
portStartport=43210

# General Configurations
hostName=http://localhost
timeoutDurationMs=10000
processStopTimeoutMs=5000
processForceStopTimeoutMs=3000

# JCEF Browser Configurations
useDevTools=false

# Actions & Run Configurations
actionID=at.jku.ssw.javawiz.intellij.action.DebugWithJavaWiz
actionName=Debug with JavaWiz